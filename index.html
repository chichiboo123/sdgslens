<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SDGs 렌즈 | 세계 뉴스를 SDGs로 읽다</title>
<meta name="description" content="UN·UNICEF·UNDP 공식 뉴스를 SDGs 17개 목표로 분석해보는 어린이·청소년 세계시민 교육 도구">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-gov.min.css" />

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%2336CFA5'/%3E%3Cstop offset='0.5' stop-color='%235DC9E2'/%3E%3Cstop offset='1' stop-color='%23B084F0'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='url(%23g)'/%3E%3Ccircle cx='27' cy='27' r='13' fill='none' stroke='white' stroke-width='4'/%3E%3Ccircle cx='27' cy='27' r='6' fill='white' opacity='0.85'/%3E%3Cline x1='37' y1='37' x2='50' y2='50' stroke='white' stroke-width='5' stroke-linecap='round'/%3E%3C/svg%3E">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="page">

  <header class="top-bar">
    <div id="brand">
      <div id="brand-icon"><span class="material-symbols-rounded">travel_explore</span></div>
      <div id="brand-text">
        <h1 data-i18n="brand.title"></h1>
        <p data-i18n="brand.subtitle"></p>
      </div>
    </div>
    <div class="top-actions">
      <div class="lang-switch" role="group" aria-label="Language">
        <button data-lang="ko" class="lang-btn active">KO</button>
        <button data-lang="en" class="lang-btn">EN</button>
        <button data-lang="ja" class="lang-btn">JA</button>
      </div>
      <button class="icon-btn icon-btn-dict" id="dict-btn" aria-label="SDGs dictionary" title="SDGs">
        <span class="material-symbols-rounded">menu_book</span>
      </button>
      <button class="icon-btn" id="help-btn" aria-label="help">
        <span class="material-symbols-rounded">help</span>
      </button>
    </div>
  </header>

  <div id="meta-row">
    <span class="meta-badge"><span class="material-symbols-rounded">verified</span> UN</span>
    <span class="meta-badge"><span class="material-symbols-rounded">verified</span> UNICEF</span>
    <span class="meta-badge"><span class="material-symbols-rounded">verified</span> UNDP</span>
    <span id="streak-badge"><span class="material-symbols-rounded">stars</span> <span data-i18n="meta.streak"></span> <b id="cnt">0</b></span>
  </div>

  <div class="steps-wrap">
    <div class="steps">
      <div class="sd-item" id="step1">
        <div class="sd-num">1</div>
        <div class="sd-txt" data-i18n="steps.s1"></div>
      </div>
      <div class="sd-line"></div>
      <div class="sd-item" id="step2">
        <div class="sd-num">2</div>
        <div class="sd-txt" data-i18n="steps.s2"></div>
      </div>
      <div class="sd-line"></div>
      <div class="sd-item" id="step3">
        <div class="sd-num">3</div>
        <div class="sd-txt" data-i18n="steps.s3"></div>
      </div>
    </div>
  </div>

  <article id="news-card">
    <div id="news-card-top">
      <div class="nsrc">
        <span class="material-symbols-rounded">verified</span>
        <span id="nsrc-txt" data-i18n="news.placeholderSource"></span>
      </div>
      <h2 class="ntitle" id="ntitle" data-i18n="news.placeholderTitle"></h2>
      <p class="nbody" id="nbody" data-i18n="news.placeholderBody"></p>
    </div>
    <div id="news-card-foot">
      <div class="ntags" id="ntags"></div>
      <a class="nlink" id="nlink" href="#" style="display:none" target="_blank" rel="noopener">
        <span class="material-symbols-rounded">open_in_new</span>
        <span data-i18n="news.readOriginal"></span>
      </a>
    </div>
  </article>

  <div id="hint-box"></div>

  <div id="action-row">
    <button class="btn btn-primary" id="fetch-btn">
      <span class="material-symbols-rounded">autorenew</span>
      <span data-i18n="actions.fetch"></span>
    </button>
    <button class="btn btn-outline" id="hint-btn" style="display:none;">
      <span class="material-symbols-rounded">lightbulb</span>
      <span data-i18n="actions.hint"></span>
    </button>
  </div>

  <section id="sdg-sec">
    <h2>
      <span class="material-symbols-rounded">checklist</span>
      <span data-i18n="sdg.heading"></span>
      <span class="sel-count" id="sel-count" hidden><b id="sel-num">0</b></span>
    </h2>
    <p class="sec-help" data-i18n="sdg.help"></p>
    <div id="sdg-grid"></div>
  </section>

  <section id="life-sec">
    <h2><span class="material-symbols-rounded">location_on</span> <span data-i18n="life.heading"></span></h2>
    <textarea id="life-input" rows="3"></textarea>
    <div class="lp-row" id="lp-row"></div>
  </section>

  <button id="sub-btn" class="btn btn-cta">
    <span class="material-symbols-rounded">travel_explore</span>
    <span data-i18n="actions.analyze"></span>
  </button>

  <section id="res-sec" aria-live="polite">
    <div class="rc">
      <div class="rc-label" data-i18n="result.lensTitle"></div>
      <div class="rchips" id="res-correct"></div>
      <div class="rtext" id="res-feedback"></div>
      <div class="score-row">
        <div class="score-ico" id="score-ico"></div>
        <div>
          <div class="score-num" id="score-num"></div>
          <div class="score-sub" id="score-sub"></div>
        </div>
      </div>
    </div>
    <div class="rc">
      <div class="rc-label" data-i18n="result.lifeTitle"></div>
      <div class="life-box" id="res-life"></div>
    </div>
    <div class="rc" id="bonus-card" style="display:none;">
      <div class="rc-label" data-i18n="result.bonusTitle"></div>
      <div class="bonus-box" id="res-bonus"></div>
    </div>
    <div class="export-card" id="export-card" style="display:none;">
      <div class="export-title"><span class="material-symbols-rounded">ios_share</span> <span data-i18n="export.title"></span></div>
      <div class="export-actions">
        <button id="export-save-btn" class="btn btn-outline" type="button">
          <span class="material-symbols-rounded">download</span>
          <span data-i18n="export.savePng"></span>
        </button>
        <button id="export-copy-btn" class="btn btn-outline" type="button">
          <span class="material-symbols-rounded">content_copy</span>
          <span data-i18n="export.copyPng"></span>
        </button>
      </div>
      <div class="export-status" id="export-status" role="status" aria-live="polite"></div>
    </div>
    <div class="result-actions">
      <button id="next-btn" class="btn btn-outline-strong">
        <span class="material-symbols-rounded">arrow_forward</span>
        <span data-i18n="actions.next"></span>
      </button>
      <button id="retry-btn" class="link-btn" type="button">
        <span class="material-symbols-rounded">refresh</span>
        <span data-i18n="actions.retry"></span>
      </button>
    </div>
  </section>

  <footer class="site-footer">
    <p>
      <a href="https://litt.ly/chichiboo" target="_blank" rel="noopener" class="footer-credit">
        Created by. <span data-i18n="footer.creator"></span>
      </a>
    </p>
    <p class="footer-sub" data-i18n="footer.purpose"></p>
  </footer>
</div>

<div class="modal" id="help-modal" hidden>
  <div class="modal-back" data-close="1"></div>
  <div class="modal-panel" role="dialog" aria-modal="true">
    <div class="modal-head">
      <h3><span class="material-symbols-rounded">help</span> <span data-i18n="help.title"></span></h3>
      <button class="icon-btn" data-close="1" aria-label="close"><span class="material-symbols-rounded">close</span></button>
    </div>
    <div class="modal-body">
      <ol class="howto" id="howto-list"></ol>
      <div class="howto-tip">
        <span class="material-symbols-rounded">tips_and_updates</span>
        <span data-i18n="help.tip"></span>
      </div>
    </div>
  </div>
</div>

<div class="modal" id="dict-modal" hidden>
  <div class="modal-back" data-close="1"></div>
  <div class="modal-panel modal-panel-wide" role="dialog" aria-modal="true">
    <div class="modal-head">
      <h3><span class="material-symbols-rounded">menu_book</span> <span id="dict-title"></span></h3>
      <button class="icon-btn" data-close="1" aria-label="close"><span class="material-symbols-rounded">close</span></button>
    </div>
    <div class="modal-body" id="dict-body"></div>
  </div>
</div>

<script src="js/i18n.js"></script>
<script src="js/sdg-dict.js"></script>
<script src="js/news-data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
